<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — LinkShort</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 32px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        a.back {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }

        a.back:hover {
            color: #e2e8f0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            max-width: 1000px;
            margin: 0 auto 24px;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 14px;
            padding: 24px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .label {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 1000px;
            margin: 0 auto 24px;
        }

        @media (max-width: 640px) {
            .charts {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #1e293b;
            border-radius: 14px;
            padding: 24px;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .top-links {
            max-width: 1000px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #0f172a;
        }

        tr:hover td {
            background: #0f172a;
        }

        .badge {
            background: #334155;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 0.8rem;
            color: #06b6d4;
        }

        .code {
            color: #6366f1;
            font-weight: 700;
        }

        .url {
            color: #94a3b8;
            font-size: 0.82rem;
        }

        .empty {
            color: #475569;
            text-align: center;
            padding: 24px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>📊 Dashboard</h1>
        <a class="back" href="/">← Kembali</a>
    </div>

    <!-- Summary Cards -->
    <div class="grid">
        <div class="stat-card">
            <div class="value" id="totalLinks">—</div>
            <div class="label">Total Link</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalClicks">—</div>
            <div class="label">Total Klik</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts">
        <div class="card">
            <h2>📈 Klik 7 Hari Terakhir</h2>
            <canvas id="chartDay"></canvas>
        </div>
        <div class="card">
            <h2>🕐 Klik per Jam Hari Ini</h2>
            <canvas id="chartHour"></canvas>
        </div>
    </div>

    <!-- Top Links -->
    <div class="top-links card">
        <h2>🏆 Top 5 Link Terbanyak Diklik</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Code</th>
                    <th>Original URL</th>
                    <th>Klik</th>
                </tr>
            </thead>
            <tbody id="topLinks">
                <tr>
                    <td colspan="4" class="empty">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const BASE = "http://localhost:5000";

        const chartDefaults = {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: "#94a3b8" }, grid: { color: "#1e293b" } },
                y: { ticks: { color: "#94a3b8" }, grid: { color: "#334155" }, beginAtZero: true }
            }
        };

        async function loadDashboard() {
            const res = await fetch(`${BASE}/dashboard/data`);
            const data = await res.json();

            // Summary
            document.getElementById("totalLinks").textContent = data.total_links;
            document.getElementById("totalClicks").textContent = data.total_clicks;

            // Chart: Klik per hari
            new Chart(document.getElementById("chartDay"), {
                type: "line",
                data: {
                    labels: data.clicks_per_day.map(d => d.day),
                    datasets: [{
                        data: data.clicks_per_day.map(d => d.total),
                        borderColor: "#6366f1",
                        backgroundColor: "rgba(99,102,241,0.15)",
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: chartDefaults
            });

            // Chart: Klik per jam
            const hours = Array.from({ length: 24 }, (_, i) => i);
            const hourMap = Object.fromEntries(data.clicks_per_hour.map(h => [h.hour, h.total]));
            new Chart(document.getElementById("chartHour"), {
                type: "bar",
                data: {
                    labels: hours.map(h => `${h}:00`),
                    datasets: [{
                        data: hours.map(h => hourMap[h] || 0),
                        backgroundColor: "rgba(6,182,212,0.7)",
                        borderRadius: 4
                    }]
                },
                options: chartDefaults
            });

            // Top links
            const tbody = document.getElementById("topLinks");
            if (!data.top_links.length) {
                tbody.innerHTML = `<tr><td colspan="4" class="empty">Belum ada data.</td></tr>`;
                return;
            }
            tbody.innerHTML = data.top_links.map((l, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><span class="code">/${l.code}</span></td>
          <td class="url">${l.url}</td>
          <td><span class="badge">👆 ${l.clicks}</span></td>
        </tr>
      `).join("");
        }

        loadDashboard();
    </script>
</body>

</html>
